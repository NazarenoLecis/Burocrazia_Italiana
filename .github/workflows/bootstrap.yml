name: Bootstrap repository

on:
  push:
    branches:
      - agent/initialize-bureaucracy-analysis
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify archive and publish repository files
        shell: bash
        run: |
          set -euo pipefail

          cat .bootstrap/archive.part-* > .bootstrap/repository.tar.gz.b64
          printf '%s  %s\n' \
            'a1ac97ef9932fbe7475dfe976012ab83e0fd4a6228b44600ec53a0a2bafcaff5' \
            '.bootstrap/repository.tar.gz.b64' | sha256sum --check --strict

          base64 --decode \
            .bootstrap/repository.tar.gz.b64 \
            > .bootstrap/repository.tar.gz
          printf '%s  %s\n' \
            'd751286deead68496a56d80600ac101574a72943ac248a631a1aa95495e5def2' \
            '.bootstrap/repository.tar.gz' | sha256sum --check --strict

          extract_dir="$(mktemp --directory)"
          tar --extract \
            --gzip \
            --file .bootstrap/repository.tar.gz \
            --directory "$extract_dir"

          rsync --archive --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.bootstrap/' \
            "$extract_dir/" ./

          rm --recursive --force .bootstrap
          rm --force .github/workflows/bootstrap.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          rm --recursive --force "$extract_dir"

          python -m compileall -q scripts
          python - <<'PY'
          import json
          from pathlib import Path

          for notebook_path in sorted(Path('notebooks').glob('*.ipynb')):
              with notebook_path.open(encoding='utf-8') as notebook_file:
                  json.load(notebook_file)
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all

          if git diff --cached --quiet; then
            echo 'No repository changes to commit.'
            exit 0
          fi

          git commit -m 'Initialize modular bureaucracy analysis repository'
          git push origin "HEAD:${GITHUB_REF_NAME}"
