name: Temporary repository validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q scripts

      - name: Validate repository conventions and notebooks
        run: |
          python - <<'PY'
          import ast
          import json
          from pathlib import Path

          project_root = Path.cwd()
          python_files = sorted((project_root / "scripts").rglob("*.py"))
          notebook_files = sorted((project_root / "notebooks").glob("*.ipynb"))

          assert python_files, "No Python files found under scripts"
          assert notebook_files, "No notebooks found"
          assert not list(project_root.rglob("__init__.py")), "__init__.py files are not allowed"

          for path in python_files:
              source = path.read_text(encoding="utf-8")
              tree = ast.parse(source, filename=str(path))
              classes = [node.name for node in ast.walk(tree) if isinstance(node, ast.ClassDef)]
              assert not classes, f"Classes found in {path}: {classes}"
              imports_argparse = any(
                  isinstance(node, ast.Import) and any(alias.name == "argparse" for alias in node.names)
                  or isinstance(node, ast.ImportFrom) and node.module == "argparse"
                  for node in ast.walk(tree)
              )
              assert not imports_argparse, f"argparse imported in {path}"

              for node in ast.walk(tree):
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                      assert ast.get_docstring(node), f"Missing docstring: {path}:{node.name}"

          expected_notebooks = [
              "01_source_inventory_and_data_check.ipynb",
              "02_legal_complexity_analysis.ipynb",
              "03_administrative_procedures_analysis.ipynb",
              "04_territorial_comparison.ipynb",
              "05_final_outputs.ipynb",
          ]
          assert [path.name for path in notebook_files] == expected_notebooks

          for path in notebook_files:
              payload = json.loads(path.read_text(encoding="utf-8"))
              assert payload.get("nbformat") == 4, f"Unexpected notebook format: {path}"
              assert payload.get("cells"), f"Notebook has no cells: {path}"

          required_paths = [
              project_root / "README.md",
              project_root / "requirements.txt",
              project_root / "scripts" / "config.py",
              project_root / "scripts" / "utils.py",
              project_root / "scripts" / "src",
              project_root / "notebooks",
              project_root / "output" / "data",
              project_root / "output" / "charts",
          ]
          missing = [str(path) for path in required_paths if not path.exists()]
          assert not missing, f"Missing required paths: {missing}"
          PY

      - name: Run complete pipeline
        run: python scripts/src/run_pipeline.py

      - name: Check idempotent second execution
        run: python scripts/src/run_pipeline.py

      - name: Validate generated outputs
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          project_root = Path.cwd()
          expected_files = [
              project_root / "output/data/processed/source_inventory.csv",
              project_root / "output/data/clean/authorities.csv",
              project_root / "output/data/clean/authorities.parquet",
              project_root / "output/data/clean/legal_acts.parquet",
              project_root / "output/data/clean/legal_provisions.parquet",
              project_root / "output/data/clean/administrative_procedures.parquet",
              project_root / "output/data/processed/bureaucracy_indicators.csv",
              project_root / "output/data/processed/bureaucracy_indicators.parquet",
              project_root / "output/data/processed/territorial_comparisons.csv",
              project_root / "output/data/processed/territorial_comparisons.parquet",
              project_root / "output/data/quality/data_quality_report.csv",
          ]

          missing = [str(path) for path in expected_files if not path.exists()]
          assert not missing, f"Missing generated files: {missing}"

          empty = [str(path) for path in expected_files if path.stat().st_size == 0]
          assert not empty, f"Empty generated files: {empty}"

          source_inventory = pd.read_csv(project_root / "output/data/processed/source_inventory.csv")
          authorities = pd.read_parquet(project_root / "output/data/clean/authorities.parquet")
          indicators = pd.read_parquet(project_root / "output/data/processed/bureaucracy_indicators.parquet")
          territorial = pd.read_parquet(project_root / "output/data/processed/territorial_comparisons.parquet")
          quality = pd.read_csv(project_root / "output/data/quality/data_quality_report.csv")

          assert not source_inventory.empty, "Source inventory is empty"
          assert not authorities.empty, "IPA authorities dataset is empty"
          assert not indicators.empty, "Indicators dataset is empty"
          assert not territorial.empty, "Territorial comparisons dataset is empty"
          assert not quality.empty, "Quality report is empty"

          required_quality_columns = {
              "check_name",
              "dataset_name",
              "check_status",
              "affected_rows",
              "total_rows",
              "affected_share",
              "severity",
              "description",
              "generated_at",
          }
          assert required_quality_columns.issubset(quality.columns), quality.columns.tolist()

          failing_quality = quality[
              quality["check_status"].astype(str).str.lower().isin({"error", "failed", "fail"})
          ]
          assert failing_quality.empty, failing_quality.to_dict(orient="records")

          charts = sorted((project_root / "output/charts").rglob("*.png"))
          assert len(charts) >= 2, f"Expected at least two charts, found {len(charts)}"
          assert all(path.stat().st_size > 0 for path in charts), "One or more charts are empty"
          PY

      - name: Execute notebooks
        run: |
          mkdir -p /tmp/executed-notebooks
          for notebook in notebooks/*.ipynb; do
            jupyter nbconvert \
              --to notebook \
              --execute "$notebook" \
              --output-dir /tmp/executed-notebooks \
              --ExecutePreprocessor.timeout=600
          done
